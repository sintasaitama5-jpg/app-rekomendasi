<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppFuture — Rekomendasi App 10 Tahun Ke Depan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c14; color: #e8f0fe; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px); background-size: 40px 40px; }
    .bg-orb { position: fixed; top: -200px; right: -200px; width: 500px; height: 500px; background: radial-gradient(circle,rgba(123,97,255,0.1) 0%,transparent 70%); pointer-events: none; z-index: 0; }
    .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }

    /* Header */
    .header { padding: 32px 0 24px; text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); border-radius: 100px; padding: 6px 16px; margin-bottom: 18px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #00e5ff; font-weight: 600; }
    h1 { font-size: 30px; font-weight: 800; line-height: 1.15; letter-spacing: -0.02em; }
    .grad { background: linear-gradient(135deg,#00e5ff,#7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: #6b7fa3; font-size: 14px; margin-top: 10px; line-height: 1.6; }

    /* Section label */
    .lbl { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b7fa3; font-weight: 600; margin: 0 0 10px; }

    /* Categories */
    .cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .cat-btn { padding: 8px 16px; border-radius: 100px; border: 1px solid #1e2d45; background: #0f1724; color: #6b7fa3; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .cat-btn.active { border-color: #00e5ff; background: rgba(0,229,255,0.1); color: #00e5ff; box-shadow: 0 0 16px rgba(0,229,255,0.15); }

    /* Textarea */
    .prompt-wrap { position: relative; margin-bottom: 14px; }
    textarea { width: 100%; background: #0f1724; border: 1px solid #1e2d45; border-radius: 16px; padding: 14px 14px 58px; color: #e8f0fe; font-family: inherit; font-size: 14px; resize: none; line-height: 1.6; min-height: 110px; outline: none; transition: border-color 0.2s; }
    textarea:focus { border-color: #00e5ff; }
    .ask-btn { position: absolute; bottom: 10px; right: 10px; background: linear-gradient(135deg,#00e5ff,#7b61ff); color: #080c14; border: none; border-radius: 10px; padding: 10px 22px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
    .ask-btn:disabled { background: #1e2d45; color: #6b7fa3; cursor: not-allowed; }

    /* Quick prompts */
    .quick-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .quick-btn { background: #0f1724; border: 1px solid #1e2d45; border-radius: 12px; padding: 12px 16px; color: #6b7fa3; font-family: inherit; font-size: 13px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
    .quick-btn:hover { border-color: #7b61ff; color: #e8f0fe; }
    .quick-icon { font-size: 18px; }

    /* Loading */
    .loading { text-align: center; padding: 40px 0; }
    .spinner { width: 48px; height: 48px; border: 2px solid #1e2d45; border-top-color: #00e5ff; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #6b7fa3; font-size: 13px; margin-bottom: 12px; }
    .step { font-size: 12px; color: #00e5ff; margin-top: 6px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Error */
    .error { background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.25); border-radius: 14px; padding: 16px; color: #ff7070; font-size: 14px; text-align: center; margin-top: 16px; }

    /* Results */
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; margin-top: 28px; }
    .result-title { font-weight: 700; font-size: 18px; }
    .result-count { font-size: 12px; color: #6b7fa3; background: #0f1724; border: 1px solid #1e2d45; border-radius: 100px; padding: 4px 12px; }

    /* Card */
    .card { background: #111827; border: 1px solid #1e2d45; border-radius: 20px; padding: 20px; margin-bottom: 14px; animation: slideUp 0.4s ease both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
    .app-icon { font-size: 28px; width: 52px; height: 52px; background: #0f1724; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #1e2d45; }
    .app-name { font-weight: 700; font-size: 17px; color: #e8f0fe; }
    .app-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #00e5ff; font-weight: 600; margin-top: 2px; }
    .score-box { text-align: right; flex-shrink: 0; }
    .score-num { font-weight: 800; font-size: 24px; color: #f5c542; line-height: 1; }
    .score-lbl { font-size: 10px; color: #6b7fa3; margin-top: 2px; }
    .bar-wrap { background: #0f1724; border-radius: 100px; height: 4px; overflow: hidden; margin: 4px 0 12px; }
    .bar { height: 100%; background: linear-gradient(90deg,#7b61ff,#00e5ff); border-radius: 100px; width: 0%; transition: width 1s ease; }
    .desc { font-size: 13px; color: #a0b0cc; line-height: 1.65; margin-bottom: 12px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag { background: rgba(123,97,255,0.12); border: 1px solid rgba(123,97,255,0.25); color: #a899ff; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
    .trend { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid #1e2d45; align-items: flex-start; font-size: 12px; color: #6b7fa3; line-height: 1.5; }

    .footer { text-align: center; font-size: 11px; color: #6b7fa3; margin-top: 40px; opacity: 0.5; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb"></div>
<div class="wrap">

  <div class="header">
    <div class="badge">◉ AI-Powered · Tren 2025–2035</div>
    <h1>App <span class="grad">Masa Depan</span><br>Yang Wajib Kamu Miliki</h1>
    <p class="subtitle">Analisis AI untuk menemukan app yang relevan hingga 10 tahun ke depan</p>
  </div>

  <div class="lbl">Pilih Kategori</div>
  <div class="cats">
    <button class="cat-btn active" data-cat="all">Semua</button>
    <button class="cat-btn" data-cat="Produktivitas">Produktivitas</button>
    <button class="cat-btn" data-cat="AI & Tech">AI & Tech</button>
    <button class="cat-btn" data-cat="Bisnis & Keuangan">Bisnis & Keuangan</button>
  </div>

  <div class="lbl">Tanya AI</div>
  <div class="prompt-wrap">
    <textarea id="prompt" rows="3" placeholder="Contoh: App untuk freelancer desain 10 tahun ke depan"></textarea>
    <button class="ask-btn" id="ask-btn" onclick="getRecommendations()">✦ Analisa</button>
  </div>

  <div class="lbl">Coba Pertanyaan Ini</div>
  <div class="quick-list">
    <button class="quick-btn" onclick="setPrompt('app produktivitas terbaik untuk entrepreneur 10 tahun ke depan')"><span class="quick-icon">🚀</span> App untuk entrepreneur masa depan</button>
    <button class="quick-btn" onclick="setPrompt('tool AI dan tech paling berpotensi hingga 2035')"><span class="quick-icon">🤖</span> Tool AI yang paling berpotensi</button>
    <button class="quick-btn" onclick="setPrompt('app keuangan dan bisnis yang wajib dipakai hingga 2035')"><span class="quick-icon">💰</span> App keuangan tahan lama</button>
  </div>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>AI sedang menganalisis tren masa depan...</p>
    <div id="steps"></div>
  </div>

  <div id="error" class="error hidden"></div>
  <div id="results"></div>

  <div class="footer">Powered by Gemini AI · Prediksi tren teknologi global 2025–2035</div>
</div>

<script>
  let activeCategory = 'all';
  const STEPS = ['🔍 Memindai tren teknologi...','📊 Menganalisis data...','🧠 Memproses prediksi...','✦ Menyusun rekomendasi...'];

  // Category buttons
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
    });
  });

  function setPrompt(q) {
    document.getElementById('prompt').value = q;
    document.getElementById('prompt').focus();
  }

  document.getElementById('prompt').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); getRecommendations(); }
  });

  let stepInterval;
  function showLoading() {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error').classList.add('hidden');
    document.getElementById('results').innerHTML = '';
    const stepsEl = document.getElementById('steps');
    stepsEl.innerHTML = '';
    let i = 0;
    stepInterval = setInterval(() => {
      if (i < STEPS.length) {
        const d = document.createElement('div');
        d.className = 'step';
        d.textContent = STEPS[i++];
        stepsEl.appendChild(d);
      }
    }, 800);
  }

  function hideLoading() {
    clearInterval(stepInterval);
    document.getElementById('loading').classList.add('hidden');
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('hidden');
  }

  async function getRecommendations() {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) return;
    const btn = document.getElementById('ask-btn');
    btn.disabled = true;
    showLoading();

    try {
      const res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, category: activeCategory }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Terjadi kesalahan');
      renderResults(data.apps);
    } catch (e) {
      showError(e.message);
    } finally {
      hideLoading();
      btn.disabled = false;
    }
  }

  function renderResults(apps) {
    const el = document.getElementById('results');
    el.innerHTML = `
      <div class="result-header">
        <span class="result-title">Rekomendasi AI</span>
        <span class="result-count">${apps.length} app</span>
      </div>
      ${apps.map((app, i) => `
        <div class="card" style="animation-delay:${i*0.07}s">
          <div class="card-top">
            <div class="app-icon">${app.icon || '📱'}</div>
            <div style="flex:1">
              <div class="app-name">${app.name}</div>
              <div class="app-cat">${app.category}</div>
            </div>
            <div class="score-box">
              <div class="score-num">${app.survivalScore}</div>
              <div class="score-lbl">Relevansi</div>
            </div>
          </div>
          <div class="bar-wrap"><div class="bar" id="bar-${i}"></div></div>
          <div class="desc">${app.description}</div>
          <div class="tags">${(app.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <div class="trend">📈 ${app.trendReason}</div>
        </div>
      `).join('')}
    `;
    apps.forEach((app, i) => {
      setTimeout(() => {
        const bar = document.getElementById('bar-' + i);
        if (bar) bar.style.width = app.survivalScore + '%';
      }, 200 + i * 80);
    });
  }
</script>
</body>
</html>
